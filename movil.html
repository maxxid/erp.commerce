<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ApexERP Móvil</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
</style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="movilApp()">
    <!-- Login -->
    <div x-show="!authenticated" class="min-h-screen bg-brand-900 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full space-y-4">
            <div class="text-center">
                <div class="w-12 h-12 rounded-xl bg-brand-600 text-white flex items-center justify-center text-xl mx-auto"><i class="fa-solid fa-cubes-stacked"></i></div>
                <h2 class="text-lg font-bold text-slate-900 mt-2">ApexERP Móvil</h2>
                <p x-show="licenseChecked && hasLicense && licenseValid" class="text-xs text-slate-400">Ingresá para ver tus métricas</p>
            </div>

            <div x-show="!licenseChecked" class="text-center text-slate-400 text-sm"><i class="fa-solid fa-circle-notch animate-spin mr-1"></i> Cargando...</div>

            <!-- Activación -->
            <div x-show="licenseChecked && (!hasLicense || !licenseValid)" class="space-y-3">
                <p class="text-xs text-rose-500 text-center font-bold" x-show="!licenseValid">Licencia expirada</p>
                <input type="text" x-model="licenseKey" @keydown.enter="activateLicense()" placeholder="Clave de licencia" class="w-full border rounded-xl p-3 text-sm font-mono text-center uppercase">
                <button @click="activateLicense()" class="w-full bg-brand-600 text-white py-3 rounded-xl font-semibold text-sm">Activar Licencia</button>
                <div x-show="licenseError" class="text-xs text-rose-500 text-center" x-text="licenseError"></div>
            </div>

            <!-- Login -->
            <div x-show="licenseChecked && hasLicense && licenseValid" class="space-y-3">
                <input type="text" x-model="loginForm.username" placeholder="Usuario" class="w-full border rounded-xl p-3 text-sm">
                <input type="password" x-model="loginForm.password" @keydown.enter="handleLogin()" placeholder="Contraseña" class="w-full border rounded-xl p-3 text-sm">
                <div x-show="loginError" class="text-xs text-rose-500 text-center" x-text="loginError"></div>
                <button @click="handleLogin()" class="w-full bg-brand-600 text-white py-3 rounded-xl font-semibold text-sm"><span x-text="loggingIn ? 'Conectando...' : 'Ingresar'"></span></button>
            </div>
        </div>
    </div>

    <!-- App -->
    <div x-show="authenticated" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white border-b px-4 py-3 flex items-center justify-between sticky top-0 z-10 safe-top">
            <h1 class="font-bold text-slate-900 text-sm" x-text="tabTitles[activeTab] || 'ApexERP'"></h1>
            <button @click="activeTab = 'mas'" class="text-slate-400 p-2"><i class="fa-solid fa-ellipsis-vertical"></i></button>
        </header>

        <!-- Dashboard -->
        <main class="flex-1 overflow-y-auto p-4 space-y-4 pb-20">
            <div x-show="activeTab === 'dashboard'">
                <div x-show="loading" class="text-center py-8 text-slate-400"><i class="fa-solid fa-circle-notch animate-spin"></i> Cargando...</div>
                <div x-show="!loading" class="space-y-4">
                    <!-- Alerta -->
                    <div x-show="alertas.length > 0" class="space-y-1">
                        <template x-for="a in alertas" :key="a.tipo">
                            <div :class="a.nivel === 'danger' ? 'bg-rose-50 text-rose-700 border-rose-200' : 'bg-amber-50 text-amber-700 border-amber-200'" class="px-3 py-2 rounded-xl border text-xs font-bold flex items-center gap-2">
                                <span x-show="a.nivel === 'danger'">🔴</span><span x-show="a.nivel === 'warning'">🟡</span>
                                <span x-text="a.mensaje"></span>
                            </div>
                        </template>
                    </div>

                    <!-- KPIs -->
                    <div class="grid grid-cols-2 gap-3">
                        <div @click="activeTab = 'dashboard'" class="bg-white border rounded-2xl p-4 text-center">
                            <div class="text-[10px] text-slate-400 uppercase font-bold">Ventas Hoy</div>
                            <div class="text-xl font-bold text-emerald-600 font-mono mt-1" x-text="fm(dash.ventas_hoy)"></div>
                            <div class="text-[10px] text-slate-400" x-text="dash.cant_ventas_hoy + ' tickets'"></div>
                        </div>
                        <div class="bg-white border rounded-2xl p-4 text-center">
                            <div class="text-[10px] text-slate-400 uppercase font-bold">Ticket Prom</div>
                            <div class="text-xl font-bold text-indigo-600 font-mono mt-1" x-text="fm(dash.ticket_promedio)"></div>
                        </div>
                        <div class="bg-white border rounded-2xl p-4 text-center">
                            <div class="text-[10px] text-slate-400 uppercase font-bold">Margen Hoy</div>
                            <div :class="(dash.margen_bruto_hoy||0) >= 0 ? 'text-emerald-600' : 'text-rose-600'" class="text-xl font-bold font-mono mt-1" x-text="fm(dash.margen_bruto_hoy)"></div>
                            <div class="text-[10px] text-slate-400" x-text="(dash.margen_pct_hoy||0) + '%'"></div>
                        </div>
                        <div class="bg-white border rounded-2xl p-4 text-center">
                            <div class="text-[10px] text-slate-400 uppercase font-bold">Stock Crítico</div>
                            <div class="text-xl font-bold text-rose-600 font-mono mt-1" x-text="dash.stock_bajo"></div>
                            <div class="text-[10px] text-rose-400">bajo mínimo</div>
                        </div>
                    </div>

                    <!-- Stock alerts detail -->
                    <div x-show="(dash.stock_critico||[]).length > 0" class="bg-white border rounded-2xl p-4">
                        <h3 class="font-bold text-sm text-rose-600 mb-2">⚠️ Stock Crítico</h3>
                        <template x-for="p in dash.stock_critico" :key="p.id">
                            <div class="flex justify-between text-xs py-1.5 border-b border-slate-50 last:border-0">
                                <span class="truncate flex-1" x-text="p.nombre"></span>
                                <span class="font-mono font-bold text-rose-600 ml-2" x-text="p.stock_actual + ' / ' + p.stock_minimo"></span>
                            </div>
                        </template>
                    </div>

                    <p x-show="!(dash.ventas_hoy > 0) && !loading" class="text-xs text-slate-400 text-center py-4">Sin ventas hoy. Deslizá para abajo para refrescar.</p>
                </div>
            </div>

            <!-- Costos -->
            <div x-show="activeTab === 'costos'">
                <div class="relative mb-3">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-xs"></i>
                    <input type="text" x-model="costoSearch" @input="fetchCostos()" placeholder="Buscar producto..." class="w-full border rounded-xl pl-9 pr-4 py-2.5 text-sm">
                </div>
                <div x-show="costosLoading" class="text-center py-8 text-slate-400"><i class="fa-solid fa-circle-notch animate-spin"></i></div>
                <div x-show="!costosLoading" class="space-y-1.5">
                    <template x-for="p in costosData" :key="p.id">
                        <div class="bg-white border rounded-xl p-3 text-xs">
                            <div class="flex justify-between items-start">
                                <span class="font-bold text-slate-800 truncate flex-1" x-text="p.nombre"></span>
                                <span :class="p.margen_pct >= 30 ? 'text-emerald-600' : (p.margen_pct >= 15 ? 'text-amber-600' : 'text-rose-600')" class="font-mono font-bold ml-2 text-xs" x-text="p.margen_pct + '%'"></span>
                            </div>
                            <div class="flex justify-between mt-1.5 text-[11px]">
                                <span>Costo: <strong class="font-mono" x-text="fm(p.ultimo_costo)"></strong></span>
                                <span>Venta: <strong class="font-mono text-brand-600" x-text="fm(p.precio_venta)"></strong></span>
                                <span>Margen: <strong class="font-mono" :class="p.margen >= 0 ? 'text-emerald-600' : 'text-rose-600'" x-text="fm(p.margen)"></strong></span>
                            </div>
                            <div class="flex justify-between mt-1 text-[10px] text-slate-400">
                                <span x-show="p.proveedor" x-text="p.proveedor"></span>
                                <span x-show="p.ultima_compra" x-text="'Última: ' + fd(p.ultima_compra)"></span>
                            </div>
                        </div>
                    </template>
                    <p x-show="costosData.length === 0 && !costosLoading" class="text-xs text-slate-400 text-center py-4">No se encontraron productos</p>
                </div>
            </div>

            <!-- Productos -->
            <div x-show="activeTab === 'productos'" class="space-y-3">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-xs"></i>
                    <input type="text" x-model="prodSearch" @input="fetchProductosMovil()" placeholder="Buscar por nombre..." class="w-full border rounded-xl pl-9 pr-4 py-2.5 text-sm">
                </div>
                <div x-show="prodLoading" class="text-center py-8 text-slate-400"><i class="fa-solid fa-circle-notch animate-spin"></i></div>
                <template x-for="p in prodData" :key="p.id">
                    <div class="bg-white border rounded-xl p-3 text-xs">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="font-bold text-slate-800" x-text="p.nombre"></span>
                                <span class="text-[10px] text-slate-400 ml-1 font-mono" x-text="p.codigo_barras"></span>
                            </div>
                            <span :class="p.stock_actual <= 0 ? 'bg-rose-50 text-rose-600' : (p.stock_actual <= (p.stock_minimo||0) ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600')" class="px-2 py-0.5 rounded-full text-[10px] font-bold" x-text="p.stock_actual <= 0 ? 'Agotado' : p.stock_actual + ' u'"></span>
                        </div>
                        <div class="flex justify-between mt-1.5 text-[11px]">
                            <span class="font-mono text-brand-600 font-bold" x-text="fm(p.precio_venta)"></span>
                            <span class="text-slate-400" x-text="p.marca || ''"></span>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Más -->
            <div x-show="activeTab === 'mas'" class="space-y-3">
                <div class="bg-white border rounded-2xl p-4 text-center text-xs space-y-1">
                    <p class="font-bold text-slate-800" x-text="currentUser.nombre"></p>
                    <p class="text-slate-400" x-text="currentUser.rol"></p>
                </div>
                <a href="/app" class="block bg-white border rounded-2xl p-4 text-center text-sm font-bold text-brand-600"> Versión Escritorio <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i></a>
                <button @click="refreshAll()" class="w-full bg-white border rounded-2xl p-4 text-sm text-slate-600 font-bold"><i class="fa-solid fa-arrows-rotate mr-1"></i> Refrescar Datos</button>
                <button @click="logout()" class="w-full bg-rose-50 text-rose-600 border border-rose-100 rounded-2xl p-4 text-sm font-bold"><i class="fa-solid fa-right-from-bracket mr-1"></i> Cerrar Sesión</button>
            </div>
        </main>

        <!-- Bottom Nav -->
        <nav class="bg-white border-t flex justify-around py-2 safe-bottom sticky bottom-0 z-10">
            <button @click="activeTab = 'dashboard'; fetchDashboard()" :class="activeTab==='dashboard'?'text-brand-600':'text-slate-400'" class="flex flex-col items-center gap-0.5 px-3 py-1 text-[10px] font-bold">
                <i class="fa-solid fa-chart-pie text-lg"></i>Inicio
            </button>
            <button @click="activeTab = 'costos'; fetchCostos()" :class="activeTab==='costos'?'text-brand-600':'text-slate-400'" class="flex flex-col items-center gap-0.5 px-3 py-1 text-[10px] font-bold">
                <i class="fa-solid fa-calculator text-lg"></i>Costos
            </button>
            <button @click="activeTab = 'productos'; fetchProductosMovil()" :class="activeTab==='productos'?'text-brand-600':'text-slate-400'" class="flex flex-col items-center gap-0.5 px-3 py-1 text-[10px] font-bold">
                <i class="fa-solid fa-box text-lg"></i>Productos
            </button>
            <button @click="activeTab = 'mas'" :class="activeTab==='mas'?'text-brand-600':'text-slate-400'" class="flex flex-col items-center gap-0.5 px-3 py-1 text-[10px] font-bold">
                <i class="fa-solid fa-ellipsis text-lg"></i>Más
            </button>
        </nav>
    </div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('movilApp', () => ({
        authenticated: false, loading: false, licenseChecked: false,
        hasLicense: false, licenseValid: false, licenseKey: '', licenseError: '',
        loginForm: { username: 'admin', password: 'admin' }, loginError: '', loggingIn: false,
        currentUser: {}, activeTab: 'dashboard',
        tabTitles: { dashboard: 'Inicio', costos: 'Costos y Márgenes', productos: 'Productos', mas: 'Más' },
        dash: {}, alertas: [],
        costosData: [], costoSearch: '', costosLoading: false,
        prodData: [], prodSearch: '', prodLoading: false,

        init() { this.checkLicense(); },

        async api(method, path, body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            const token = localStorage.getItem('apex_token');
            if (token) opts.headers['Authorization'] = 'Bearer ' + token;
            if (body) opts.body = JSON.stringify(body);
            const resp = await fetch(path, opts);
            if (!resp.ok) throw new Error((await resp.json().catch(() => ({}))).detail || resp.statusText);
            return resp.json();
        },

        fm(v) { return '$' + (v || 0).toLocaleString('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); },
        fd(iso) { if (!iso) return ''; const d = new Date(iso); return d.toLocaleDateString('es-AR'); },

        async checkLicense() {
            try { const r = await this.api('GET', '/api/licencia/estado'); this.hasLicense = r.data.tiene_licencia; this.licenseValid = r.data.valida; } catch (e) { this.hasLicense = false; this.licenseValid = false; }
            this.licenseChecked = true;
            if (this.hasLicense && this.licenseValid) { const t = localStorage.getItem('apex_token'); if (t) { this.autoLogin(); } }
        },

        async activateLicense() {
            this.licenseError = '';
            try { const r = await this.api('POST', '/api/licencia/activar', { clave: this.licenseKey }); this.hasLicense = true; this.licenseValid = true; this.licenseKey = ''; } catch (e) { this.licenseError = e.message; }
        },

        async handleLogin() {
            this.loggingIn = true; this.loginError = '';
            try {
                const r = await this.api('POST', '/api/auth/login', this.loginForm);
                localStorage.setItem('apex_token', r.data.access_token);
                this.currentUser = r.data;
                this.authenticated = true;
                this.fetchDashboard();
            } catch (e) { this.loginError = e.message; }
            this.loggingIn = false;
        },

        autoLogin() { this.authenticated = true; this.fetchDashboard(); },

        async fetchDashboard() {
            this.loading = true;
            try {
                const [dr, ar] = await Promise.all([this.api('GET', '/api/dashboard/resumen'), this.api('GET', '/api/dashboard/alertas')]);
                if (dr && dr.data) this.dash = dr.data;
                if (ar && ar.data) this.alertas = ar.data.alertas || [];
            } catch (e) {}
            this.loading = false;
        },

        async fetchCostos() {
            this.costosLoading = true;
            const q = this.costoSearch ? '&search=' + encodeURIComponent(this.costoSearch) : '';
            try { const r = await this.api('GET', '/api/productos/costos?page_size=200' + q); if (r && r.data) this.costosData = r.data; } catch (e) { this.costosData = []; }
            this.costosLoading = false;
        },

        async fetchProductosMovil() {
            this.prodLoading = true;
            const q = this.prodSearch ? '&search=' + encodeURIComponent(this.prodSearch) : '';
            try { const r = await this.api('GET', '/api/productos?page_size=200' + q); if (r && r.data) this.prodData = r.data; } catch (e) { this.prodData = []; }
            this.prodLoading = false;
        },

        refreshAll() { this.fetchDashboard(); this.fetchCostos(); this.fetchProductosMovil(); },
        logout() { localStorage.removeItem('apex_token'); this.authenticated = false; this.activeTab = 'dashboard'; }
    }));
});
</script>
</body>
</html>
